<div class="profile-container">
    <h2>Profile Management</h2>
    <form (ngSubmit)="saveProfile()">
      <label for="name">Name:</label>
      <input type="text" id="name" [(ngModel)]="profile.name" name="name" required />
  
      <label for="age">Age:</label>
      <input type="number" id="age" [(ngModel)]="profile.age" name="age" required />
  
      <label for="gender">Gender:</label>
      <select id="gender" [(ngModel)]="profile.gender" name="gender" required>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
  
      <label for="weight">Weight:</label>
      <input type="number" id="weight" [(ngModel)]="profile.weight" name="weight" required />
  
      <label for="height">Height:</label>
      <input type="number" id="height" [(ngModel)]="profile.height" name="height" required />
  
      <label for="fitnessLevel">Fitness Level:</label>
      <select id="fitnessLevel" [(ngModel)]="profile.fitnessLevel" name="fitnessLevel" required>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
  
      <button type="submit">Save</button>
    </form>
  
    <p>{{ message }}</p>
  </div>
